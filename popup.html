<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Qwen Translator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <div class="panel">
      <h1>本地翻译</h1>

      <div class="lang-label-row" style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
        <div style="flex:1;">
          <label for="sourceLang" style="font-size:13px;">原语言类型</label>
        </div>
        <div style="width:calc(var(--select-height,36px) * 0.6);"></div>
        <div style="flex:1;">
          <label for="targetLang" style="font-size:13px;">目标语言类型</label>
        </div>
      </div>

      <div class="lang-row" style="--select-height:36px;display:flex;gap:8px;align-items:center;margin-bottom:8px;">
        <div style="flex:1;display:flex;flex-direction:column;">
          <select id="sourceLang" style="height:var(--select-height);padding:6px 8px;border-radius:6px;border:1px solid #ccc;background:white;min-width:120px;">
            <!-- options filled by popup.js -->
          </select>
        </div>

        <div style="display:flex;align-items:center;justify-content:center;">
          <button id="swapLangBtn" title="切换" style="width:calc(var(--select-height) * 0.6);height:calc(var(--select-height) * 0.6);border-radius:6px;border:none;background:#1f6feb;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:calc(var(--select-height) * 0.45);">⇄</button>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;">
          <select id="targetLang" style="height:var(--select-height);padding:6px 8px;border-radius:6px;border:1px solid #ccc;background:white;min-width:120px;">
            <!-- options filled by popup.js -->
          </select>
        </div>
      </div>

      <label style="margin-top:6px;">待翻译文本</label>
      <textarea id="inputText" placeholder="粘贴需要翻译的文本"></textarea>

      <div class="row">
        <button id="translateBtn">翻译</button>
        <button id="copyBtn" type="button">复制结果</button>
      </div>

      <label>结果</label>
      <textarea id="outputText" readonly placeholder="翻译结果会显示在这里"></textarea>

      <div class="meta">
        <span id="metaInfo">自动识别待翻译文本语言类型</span>
      </div>

      <button id="settingsIconBtn" title="设置" style="position: absolute; top: 12px; right: 12px; width:28px; height:28px; border-radius:6px; background:transparent; border:none; cursor:pointer; font-size:18px;">⚙️</button>
    </div>
    <script type="module" src="cld3-init.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
